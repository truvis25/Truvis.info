version: '3.9'

services:
  # ─────────────────────────────────────────
  # BACKEND API
  # ─────────────────────────────────────────
  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
      target: production
    container_name: truvis-api
    restart: unless-stopped
    env_file: ../../.env
    environment:
      NODE_ENV: production
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - truvis-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─────────────────────────────────────────
  # FRONTEND
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      target: production
    container_name: truvis-frontend
    restart: unless-stopped
    env_file: ../../.env
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - truvis-network

  # ─────────────────────────────────────────
  # POSTGRESQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: truvis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-truvis_prod}
      POSTGRES_USER: ${POSTGRES_USER:-truvis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - truvis-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-truvis}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Never expose PostgreSQL port in production
    # ports:
    #   - "5432:5432"

  # ─────────────────────────────────────────
  # REDIS
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: truvis-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - truvis-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # NGINX REVERSE PROXY
  # ─────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: truvis-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/sites:/etc/nginx/sites-available:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot
    depends_on:
      - api
      - frontend
    networks:
      - truvis-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  certbot_www:
    driver: local

networks:
  truvis-network:
    driver: bridge
